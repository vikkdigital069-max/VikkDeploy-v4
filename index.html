<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VikkDeploy v4 |Deploy cloud</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #9d50bb;
            --accent-glow: rgba(157, 80, 187, 0.6);
            --success: #00ffa3;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: white; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; background: #000; 
        }

        #bg-video { 
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; 
            z-index: -1; object-fit: cover; filter: brightness(0.3); 
        }

        /* NOTIFIKASI DROPDOWN */
        #notification { 
            position: fixed; top: -120px; left: 50%; transform: translateX(-50%); 
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); 
            border: 1px solid var(--success); padding: 18px 35px; border-radius: 60px; 
            display: flex; align-items: center; gap: 15px; 
            box-shadow: 0 15px 40px rgba(0, 255, 163, 0.3); z-index: 1000; 
        }
        #notification.show { top: 40px; }
        .check-icon { 
            width: 32px; height: 32px; background: var(--success); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: black; font-weight: bold; 
        }

        /* CARD STYLE */
        .vikk-card { 
            background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); 
            border: 1px solid var(--border); border-radius: 40px; 
            width: 92%; max-width: 450px; overflow: hidden; 
            box-shadow: 0 30px 80px rgba(0,0,0,0.9); z-index: 1; 
            animation: slideUp 0.8s ease; 
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .video-header { 
            width: 100%; height: 180px; overflow: hidden; 
            border-bottom: 1px solid var(--border); 
        }
        .video-header video { width: 100%; height: 100%; object-fit: cover; }

        .card-content { padding: 40px; text-align: center; }
        .logo { 
            font-family: 'Orbitron', sans-serif; font-size: 2rem; 
            margin-bottom: 35px; letter-spacing: 2px; 
            display: flex; align-items: center; justify-content: center; gap: 12px; 
        }
        .logo i { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
        .logo span { color: var(--accent); font-weight: 700; }

        /* INPUT FIELD */
        .input-box { text-align: left; margin-bottom: 25px; }
        label { 
            font-size: 0.75rem; color: var(--accent); font-weight: 800; 
            display: block; margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; 
        }
        .input-wrapper { position: relative; }
        .input-wrapper i { 
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%); 
            color: rgba(255,255,255,0.4); 
        }
        
        input { 
            width: 100%; padding: 16px 16px 16px 48px; 
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); 
            border-radius: 15px; color: white; font-size: 0.95rem; 
        }
        input:focus { 
            border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); 
            background: rgba(0,0,0,0.7); 
        }

        /* BUTTON */
        .btn-deploy { 
            width: 100%; padding: 20px; background: var(--accent); border: none; 
            border-radius: 18px; color: white; font-family: 'Orbitron', sans-serif; 
            font-weight: 700; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; gap: 12px; text-transform: uppercase; letter-spacing: 2px; 
            box-shadow: 0 10px 30px rgba(157, 80, 187, 0.4); 
        }
        .btn-deploy:hover { transform: translateY(-5px); filter: brightness(1.2); }
        .btn-deploy:disabled { background: #444; cursor: not-allowed; transform: none; box-shadow: none; }

        /* LOADING & RESULT */
        .loader-wrap { display: none; margin-top: 30px; }
        .progress-container { 
            height: 8px; background: rgba(255,255,255,0.1); 
            border-radius: 10px; overflow: hidden; margin-bottom: 10px; 
        }
        #bar { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        #status-text { font-size: 0.8rem; color: #bbb; letter-spacing: 1px; }

        #result-area { 
            display: none; margin-top: 35px; padding-top: 25px; 
            border-top: 1px solid var(--border); animation: fadeIn 0.5s ease; 
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .url-link { 
            color: var(--success); font-weight: 700; text-decoration: none; 
            display: block; margin-bottom: 25px; font-size: 1.1rem; 
            border: 1px dashed var(--success); padding: 12px; border-radius: 12px; 
            background: rgba(0, 255, 163, 0.05); overflow: hidden; 
            text-overflow: ellipsis; white-space: nowrap; 
        }
        .copy-btn { 
            background: #fff; color: #000; border: none; padding: 15px; 
            border-radius: 15px; font-weight: 800; cursor: pointer; 
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; 
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://image2url.com/r2/default/videos/1772608328136-685c2c99-c196-4bec-b246-97b79474db90.mp4" type="video/mp4">
    </video>

    <div id="notification">
        <div class="check-icon"><i class="fas fa-check"></i></div>
        <div style="font-weight: 700;">WEBSITE BERHASIL ONLINE!</div>
    </div>

    <div class="vikk-card">
        <div class="video-header">
            <video autoplay muted loop playsinline>
                <source src="https://image2url.com/r2/default/videos/1772608016384-b14e51cd-de82-4c7c-ada9-0b33d0207432.mp4" type="video/mp4">
            </video>
        </div>

        <div class="card-content">
            <div class="logo"><i class="fas fa-cloud-bolt"></i> VikkDeploy <span>v4</span></div>
            
            <div class="input-box">
                <label>Nama Proyek</label>
                <div class="input-wrapper">
                    <i class="fas fa-code"></i>
                    <input type="text" id="p_name" placeholder="misal: vikk-store-app">
                </div>
            </div>
            
            <div class="input-box">
                <label>Pilih File (.html)</label>
                <div class="input-wrapper">
                    <i class="fas fa-upload"></i>
                    <input type="file" id="f_input" accept=".html">
                </div>
            </div>

            <button class="btn-deploy" id="btn-run" onclick="startVercelDeploy()">
                <i class="fas fa-rocket"></i> EKSEKUSI DEPLOY
            </button>

            <div class="loader-wrap" id="loader">
                <div class="progress-container"><div id="bar"></div></div>
                <div id="status-text">Menunggu instruksi...</div>
            </div>

            <div id="result-area">
                <a href="#" target="_blank" class="url-link" id="site-url">https://menghubungkan-server...</a>
                <button class="copy-btn" id="copy-btn" onclick="copyToClipboard()">
                    <i class="fas fa-copy"></i> SALIN TAUTAN
                </button>
            </div>
        </div>
    </div>

    <script>
        /** * MASUKKAN VERCEL TOKEN ANDA DI SINI 
         * Dapatkan di: https://vercel.com/account/tokens
         */
        const VERCEL_TOKEN = 'MASUKKAN_TOKEN_ANDA_DISINI'; 

        async function startVercelDeploy() {
            const projectName = document.getElementById('p_name').value.trim();
            const fileInput = document.getElementById('f_input');
            const file = fileInput.files[0];

            if (!projectName || !file) {
                alert("Harap isi nama proyek dan pilih file HTML!");
                return;
            }

            if (VERCEL_TOKEN.includes('MASUKKAN_TOKEN')) {
                alert("Variabel VERCEL_TOKEN belum diisi di dalam script!");
                return;
            }

            // UI Progress Start
            const btn = document.getElementById('btn-run');
            const loader = document.getElementById('loader');
            btn.style.display = 'none';
            loader.style.display = 'block';

            updateProgress(30, "Membaca konten file...");

            const reader = new FileReader();
            reader.onload = async (e) => {
                const fileContent = e.target.result;
                updateProgress(60, "Mengunggah ke infrastruktur Vercel...");

                try {
                    const response = await fetch('https://api.vercel.com/v13/deployments', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${VERCEL_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            name: projectName,
                            files: [{
                                file: 'index.html',
                                data: fileContent
                            }],
                            projectSettings: {
                                framework: null
                            }
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        updateProgress(100, "Online! Sinkronisasi domain...");
                        showFinalResult(`https://${data.url}`);
                    } else {
                        throw new Error(data.error.message || "Gagal menghubungi API Vercel");
                    }
                } catch (err) {
                    alert("DEPLOY ERROR: " + err.message);
                    btn.style.display = 'flex';
                    loader.style.display = 'none';
                }
            };
            reader.readAsText(file);
        }

        function updateProgress(val, text) {
            document.getElementById('bar').style.width = val + '%';
            document.getElementById('status-text').innerText = text;
        }

        function showFinalResult(url) {
            document.getElementById('notification').classList.add('show');
            const linkTag = document.getElementById('site-url');
            linkTag.innerText = url;
            linkTag.href = url;
            document.getElementById('result-area').style.display = 'block';
        }

        function copyToClipboard() {
            const url = document.getElementById('site-url').innerText;
            navigator.clipboard.writeText(url);
            const btn = document.getElementById('copy-btn');
            btn.innerHTML = '<i class="fas fa-check"></i> BERHASIL DISALIN';
            btn.style.background = '#00ffa3';
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-copy"></i> SALIN TAUTAN';
                btn.style.background = '#fff';
            }, 2000);
        }
    </script>
</body>
</html>
