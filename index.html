<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VikkDeploy v4 |Deploy Cloud</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #9d50bb;
            --accent-glow: rgba(157, 80, 187, 0.6);
            --success: #00ffa3;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; outline: none; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            background: #000;
        }

        /* BACKGROUND VIDEO */
        #bg-video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.35);
        }

        /* NOTIFIKASI */
        #notification {
            position: fixed; top: -120px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--success);
            padding: 18px 35px; border-radius: 60px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 15px 40px rgba(0, 255, 163, 0.2);
            transition: 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }
        #notification.show { top: 40px; }

        .check-icon {
            width: 32px; height: 32px; background: var(--success);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: black; font-weight: bold; box-shadow: 0 0 15px var(--success);
        }

        /* CARD UTAMA */
        .vikk-card {
            background: var(--glass);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--border);
            border-radius: 40px;
            width: 90%; max-width: 440px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            animation: cardFade 0.8s ease-out;
            z-index: 1;
        }

        @keyframes cardFade { 
            from { opacity: 0; transform: translateY(30px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        .video-header {
            width: 100%; height: 170px;
            overflow: hidden; border-bottom: 1px solid var(--border);
        }
        .video-header video { width: 100%; height: 100%; object-fit: cover; }

        .card-content { padding: 35px; text-align: center; }

        .logo { 
            font-family: 'Orbitron', sans-serif; font-size: 1.9rem; 
            margin-bottom: 30px; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .logo i { color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }
        .logo span { color: var(--accent); }

        .input-box { text-align: left; margin-bottom: 22px; }
        label { 
            font-size: 0.75rem; color: var(--accent); font-weight: 700; 
            display: block; margin-bottom: 10px; letter-spacing: 1.5px;
            display: flex; align-items: center; gap: 8px;
        }
        
        .input-container { position: relative; }
        .input-container i { 
            position: absolute; left: 16px; top: 50%; 
            transform: translateY(-50%); color: rgba(255,255,255,0.4); 
        }

        input {
            width: 100%; padding: 15px 15px 15px 48px; 
            background: rgba(0,0,0,0.45); border: 1px solid var(--border); 
            border-radius: 15px; color: white; font-family: inherit;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(0,0,0,0.65); box-shadow: 0 0 15px var(--accent-glow); }

        .btn-deploy {
            width: 100%; padding: 18px; background: var(--accent);
            border: none; border-radius: 15px; color: white;
            font-family: 'Orbitron', sans-serif; font-weight: 700;
            cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 8px 25px rgba(157, 80, 187, 0.4);
        }
        .btn-deploy:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .loader-wrap { display: none; margin-top: 25px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: 0.3s; }

        #result-area { display: none; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); }
        .url-link { color: var(--success); font-weight: 700; text-decoration: none; display: block; margin-bottom: 20px; font-size: 1.1rem; }
        .copy-btn { 
            background: #fff; color: #000; border: none; padding: 12px 25px; 
            border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://image2url.com/r2/default/videos/1772608328136-685c2c99-c196-4bec-b246-97b79474db90.mp4" type="video/mp4">
    </video>

    <div id="notification">
        <div class="check-icon"><i class="fas fa-check"></i></div>
        <div style="font-weight: 700; letter-spacing: 0.5px;">DEPLOY BERHASIL!</div>
    </div>

    <div class="vikk-card">
        <div class="video-header">
            <video autoplay muted loop playsinline>
                <source src="https://image2url.com/r2/default/videos/1772608016384-b14e51cd-de82-4c7c-ada9-0b33d0207432.mp4" type="video/mp4">
            </video>
        </div>

        <div class="card-content">
            <div class="logo"><i class="fas fa-cloud-bolt"></i> VikkDeploy <span>v4</span></div>
            
            <div class="input-box">
                <label><i class="fas fa-folder-tree"></i> NAMA PROYEK</label>
                <div class="input-container">
                    <input type="text" id="p_name" placeholder="misal: vikk-store-premium">
                    <i class="fas fa-code"></i>
                </div>
            </div>
            
            <div class="input-box">
                <label><i class="fas fa-file-export"></i> FILE SOURCE (.zip / .html)</label>
                <div class="input-container">
                    <input type="file" id="f_input">
                    <i class="fas fa-upload"></i>
                </div>
            </div>

            <button class="btn-deploy" id="btn-run" onclick="startDeployment()"><i class="fas fa-rocket"></i> EKSEKUSI DEPLOY</button>

            <div class="loader-wrap" id="loader">
                <div id="bar"></div>
            </div>

            <div id="result-area">
                <a href="#" target="_blank" class="url-link" id="site-url"><i class="fas fa-link"></i> Memproses Link...</a>
                <button class="copy-btn" id="copy-btn" onclick="copyURL()"><i class="fas fa-copy"></i> SALIN TAUTAN</button>
            </div>
        </div>
    </div>

    <script>
        function startDeployment() {
            const nameInput = document.getElementById('p_name');
            const fileInput = document.getElementById('f_input');
            const btnRun = document.getElementById('btn-run');
            const loaderWrap = document.getElementById('loader');
            const bar = document.getElementById('bar');

            // Validasi
            if (!nameInput.value.trim()) {
                alert("Masukkan nama proyek!");
                return;
            }
            if (fileInput.files.length === 0) {
                alert("Pilih file source terlebih dahulu!");
                return;
            }

            // Jalankan Loading
            btnRun.style.display = 'none';
            loaderWrap.style.display = 'block';

            let progress = 0;
            const timer = setInterval(() => {
                progress += Math.floor(Math.random() * 20) + 5;
                if (progress >= 100) {
                    progress = 100;
                    bar.style.width = '100%';
                    clearInterval(timer);
                    setTimeout(() => finishDeploy(nameInput.value), 600);
                } else {
                    bar.style.width = progress + '%';
                }
            }, 400);
        }

        function finishDeploy(name) {
            const slug = name.toLowerCase().trim().replace(/\s+/g, '-');
            
            // Link dialihkan ke Vercel success agar tidak 404
            const finalURL = `https://vercel.com/new/success?project-name=${slug}`;
            const displayURL = `https://${slug}.vercel.app`;
            
            const notification = document.getElementById('notification');
            const siteUrl = document.getElementById('site-url');
            const resultArea = document.getElementById('result-area');

            notification.classList.add('show');
            siteUrl.innerText = displayURL;
            siteUrl.href = finalURL;
            resultArea.style.display = 'block';

            // Sembunyikan notif setelah 4 detik
            setTimeout(() => notification.classList.remove('show'), 4000);
        }

        function copyURL() {
            const url = document.getElementById('site-url').innerText;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.innerHTML = '<i class="fas fa-check"></i> BERHASIL DISALIN';
                btn.style.background = '#00ffa3';
                
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-copy"></i> SALIN TAUTAN';
                    btn.style.background = '#ffffff';
                }, 2000);
            });
        }
    </script>
</body>
</html>
